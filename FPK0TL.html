<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Right key</title>

    <style>
        .textcik1 {
            font-size: 24px;
            color: red;
            text-align: center;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .textcik2 {
            font-size: 24px;
            color: #00f;
            text-align: center;
            margin-top: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mid{
            display: flex;
            justify-content: center;
            align-items: center;
            dimension: 100%;
        }

        .dot {
            display: block;
            width: 300px;           
            height: 300px;
            align-items: center;
            background-color: red;
            border-radius: 50%;
            cursor: pointer;         
            transition: transform 0.2s; 
            margin-top: 10%;          
        }

        .dot:hover {
            transform: scale(1.2);   
        }
    </style>
</head>

<body>
    <p class="textcik1">
        If you are a legend press the red button below
    </p>

    <a href="/YourTrulyALegend.html">
        <div class="mid">
            <div class="dot">
                <p class="textcik2">
                    Enter to a page created for a legend
                </p>
            </div>
        </div>
    </a>
</body>

</html>
