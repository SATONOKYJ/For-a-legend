<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Please enter the key</title>

    <style>
        
    </style>
</head>
<body>


    <input type="text" id="keyInput" placeholder="Enter key here">
    <button id="submitKey">Submit</button>

    <!-- Key: FPK0TL -->

    <script>
        document.getElementById("submitKey").addEventListener("click", function() {
        const key = document.getElementById("keyInput").value;
        window.location.href = "./" + encodeURIComponent(key) + ".html";
        });
    </script>


</body>
</html>
